<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — PropJunkie</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0c0f0a; --surface: #141a12; --border: #1e2a1a;
            --accent: #c9a84c; --accent-hover: #a8893a; --text: #e8ecf4; --muted: #4a6a44;
        }
        body {
            background: var(--bg); color: var(--text); min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6;
        }
        a { text-decoration: none; color: inherit; }
        nav { border-bottom: 1px solid var(--border); padding: 14px 24px; background: var(--surface); }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .wrap { max-width: 440px; margin: 48px auto; padding: 0 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
        h1 { font-size: 22px; font-weight: 800; }
        .label { color: var(--muted); font-size: 13px; margin-top: 18px; }
        .email { font-size: 16px; font-weight: 600; margin-top: 2px; }
        .btn {
            width: 100%; margin-top: 24px; padding: 12px; border: none; border-radius: 9px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            background: var(--accent); color: var(--bg);
        }
        .btn:hover { background: var(--accent-hover); }
        .link { display: inline-block; margin-top: 18px; color: var(--accent); font-size: 14px; }
    </style>
</head>
<body>
    <nav><a href="/" class="logo"><span>Prop</span>Junkie</a></nav>
    <div class="wrap">
        <div class="card">
            <h1>Your account</h1>
            <div class="label">Signed in as</div>
            <div class="email">{{ current_user.email }}</div>

            <form method="POST" action="/logout">
                {{ form.hidden_tag() }}
                <button type="submit" class="btn">Log out</button>
            </form>

            <a href="/app" class="link">← Back to the app</a>
        </div>
    </div>
</body>
</html>
